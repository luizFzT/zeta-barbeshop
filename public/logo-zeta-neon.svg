<svg width="100%" height="100%" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradient for the horizontal flare -->
    <linearGradient id="flare-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(168,85,247, 0)" />
      <stop offset="25%" stop-color="rgba(168,85,247, 0.8)" />
      <stop offset="50%" stop-color="rgba(34,211,238, 1)" />
      <stop offset="75%" stop-color="rgba(168,85,247, 0.8)" />
      <stop offset="100%" stop-color="rgba(168,85,247, 0)" />
    </linearGradient>

    <!-- Linear Gradient for Text Stroke (Purple to Cyan) -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;display=swap');
      
      .zeta-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 88px;
        font-weight: 900;
        fill: none;
        stroke: url(#text-grad);
        stroke-width: 3;
        letter-spacing: 6px;
      }
      
      .zeta-glow {
        font-family: 'Orbitron', sans-serif;
        font-size: 88px;
        font-weight: 900;
        fill: none;
        stroke: url(#text-grad);
        stroke-width: 8;
        letter-spacing: 6px;
        opacity: 0.6;
        filter: url(#glow-cyan);
      }
      
      .barbershop-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 14px;
        opacity: 0.9;
      }
    </style>
  </defs>

  <g transform="translate(300, 100)">
    
    <!-- Background Lens Flare (Horizontal Light Ray) -->
    <ellipse cx="0" cy="-10" rx="260" ry="2" fill="url(#flare-grad)" filter="url(#glow-purple)" />
    <ellipse cx="0" cy="-10" rx="160" ry="1" fill="#ffffff" filter="url(#glow-cyan)" opacity="0.9"/>
    <circle cx="0" cy="-10" r="4" fill="#ffffff" filter="url(#glow-cyan)"/> <!-- Center sparkle -->

    <!-- ZETA Text (Outlined Neon) -->
    <text x="0" y="24" class="zeta-glow" text-anchor="middle">ZETA</text>
    <text x="0" y="24" class="zeta-text" text-anchor="middle">ZETA</text>
    
    <!-- BARBERSHOP Text (Solid tracking text) -->
    <text x="7" y="64" class="barbershop-text" text-anchor="middle">BARBERSHOP</text>
    
  </g>
</svg>
